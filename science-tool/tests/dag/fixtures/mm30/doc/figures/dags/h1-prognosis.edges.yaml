dag: h1-prognosis
source_dot: doc/figures/dags/h1-prognosis.dot
edges:
- id: 1
  source: gain1q
  target: pbx1
  source_label: gain(1q) status
  target_label: PBX1/RFX5 axis
  original_label: dosage
  edge_style: solid
  relation: "dosage \u2192 transcription"
  edge_status: supported
  identification: observational
  description: gain(1q) amplifies PBX1 and RFX5, which sit on 1q23 and are gene-dose sensitive. This is
    the upstream gene-dosage step in the Walker 2024 feedforward loop; the effect is real at the DNA level
    but only part of PHF19 variance is mediated through PBX1/RFX5 (MM30 t082 shows ~7% of PHF19 variance
    explained by gain(1q)).
  data_support:
  - task: t082
    description: "PHF19 residualization on gain(1q) \u2014 only 7% of PHF19 variance is explained by gain(1q)\
      \ status in MMRF, bounding how much of the dosage\u2192PBX1\u2192PHF19 path is doing the work."
  lit_support:
  - doi: 10.1038/s41467-024-48327-9
    author_year: Walker2024
    description: "scMultiomics in 49 MM patients (325,025 cells) demonstrates that 1q gain amplifies PBX1/RFX5\
      \ (both on 1q23) and that these TFs in turn regulate PHF19 \u2014 the canonical PBX1 feedforward\
      \ loop motif."
- id: 2
  source: pbx1
  target: phf19
  source_label: PBX1/RFX5 axis
  target_label: PHF19 expression
  original_label: transcription
  edge_style: solid
  relation: "TF \u2192 target"
  edge_status: tentative
  identification: observational
  description: PBX1/RFX5 are proposed to transcriptionally drive PHF19 (which sits on 9q, not 1q), closing
    the feedforward loop from gain(1q) to PHF19. Support is primarily Walker 2024's regulatory inference;
    in MM30 bulk RNA the step has not been tested as a dedicated Bayesian edge and the step is almost
    certainly not the only input to PHF19 in gain(1q)-negative patients.
  data_support:
  - task: t082
    description: "93.8% of PHF19's survival effect and a majority of its variance is retained after gain(1q)\
      \ adjustment \u2014 implying regulators beyond the gain(1q)\u2192PBX1 axis drive PHF19 in 1q- patients."
  lit_support:
  - doi: 10.1038/s41467-024-48327-9
    author_year: Walker2024
    description: PBX1 identified as a candidate TF regulator of PHF19 by scATAC-seq + SCENIC-style regulon
      analysis in the RRPC subpopulation, connecting 1q dosage to PHF19 overexpression.
- id: 3
  source: other_reg
  target: phf19
  source_label: Other PHF19 regulators
  target_label: PHF19 expression
  original_label: '?'
  edge_style: dashed
  relation: unknown regulators
  edge_status: unknown
  identification: observational
  description: 'A substantial portion of PHF19 expression is not explained by gain(1q) dosage (t082: 93%
    of survival coefficient retained in gain(1q)-negative patients; only 7% of variance explained by gain(1q)).
    One or more additional regulators must exist, but their identity has not been established. Candidates
    include enhancer activation, additional TFs (E2F1, EZH2 coregulation), and epigenetic feedback.'
  data_support:
  - task: t082
    description: 93.8% coefficient retention after gain(1q) adjustment; PHF19 remains significant in gain(1q)-
      alone (HR=1.35, p=3.9e-06, n=430); only 7% of PHF19 variance explained by gain(1q).
  - task: t091
    description: 5/5 cross-dataset replication of PHF19 survival effect (GSE19784, GSE24080, GSE57317,
      GSE9782, MMRF) across three platforms establishes that the PHF19 signal is not carried solely by
      gain(1q)-annotated datasets.
  lit_support: []
- id: 4
  source: phf19
  target: prc2
  source_label: PHF19 expression
  target_label: PRC2 retargeting (latent)
  original_label: Tudor domain recruitment
  edge_style: solid
  relation: complex recruitment
  edge_status: supported
  identification: interventional
  description: PHF19 is a PRC2.1 accessory subunit whose Tudor domain reads H3K36me3 at actively transcribed
    genes and recruits PRC2 to invade novel loci, establishing broad H3K27me3 domains. The mechanism is
    biochemically established and reproduces in MM1S cells.
  data_support:
  - task: t124
    description: "Re-analysis of Ren 2019 PHF19-KD RNA-seq (GSE136410, MM1S cells) shows IFN pathway genes\
      \ derepressed on PHF19 knockdown (MW p=6.4e-9, d=0.49) and E2F targets repressed (p=8.3e-89) \u2014\
      \ both reversed by PHF19 rescue. Direct MM-specific evidence that PHF19 loss collapses the PRC2\
      \ retargeting program."
  - task: t116
    description: "Proxy cross-reference against ES-cell PRC2 consensus targets \u2014 PHF19 is selectively\
      \ NOT associated with constitutive PRC2 targets (p=0.55), consistent with retargeting to novel loci\
      \ rather than amplifying canonical targets."
  lit_support:
  - doi: null
    author_year: PHF19-comprehensive
    description: "Mechanism review collating Ballar\xE9 2012 / Brien 2012 Tudor\u2013H3K36me3 biochemistry,\
      \ Ren 2019 broad H3K27me3 domains in MM, and PRC2.1 complex stoichiometry placing PHF19 as the PRC2\
      \ specificity factor in MM."
  - doi: 10.1038/s41467-024-48327-9
    author_year: Walker2024
    description: scATAC-seq in the RRPC subset links high PHF19 to altered chromatin accessibility and
      tumour-suppressor silencing, consistent with PRC2 retargeting.
  - doi: 10.1038/s41586-024-07328-w
    author_year: Parreno2024
    description: "Cross-system mechanistic support. In Drosophila larval eye imaginal discs, transient
      (24 h) depletion of the PRC1 subunit Polyhomeotic is sufficient to induce an irreversible cancer
      fate at 100% penetrance \u2014 even after PH protein and genome-wide H3K27me3 are fully restored.
      Establishes that Polycomb perturbation is causally consequential for cell fate and that the
      perturbation need not be permanent to produce permanent change. Indirect for MM (fly PRC1 not
      mammalian PRC2), but the PRC1/PRC2 cooperation and the cited PRC2-inhibition literature in
      mammalian cells make it a well-motivated cross-system anchor for the idea that the PRC2-retargeting
      step in edge 4 has causal, not merely correlative, weight."
- id: 5
  source: prc2
  target: ifn
  source_label: PRC2 retargeting (latent)
  target_label: IFN-JAK-STAT silencing
  original_label: "H3K27me3 at new loci (IFN arm: 4 interventional anchors \u00D7 2 cell lines)"
  edge_style: solid
  relation: repressive mark deposition
  edge_status: supported
  identification: interventional
  description: "PHF19-directed PRC2 deposits H3K27me3 at IFN-JAK-STAT loci, silencing ISGs (GBP2, RSAD2,\
    \ IFI44L, GBP4). **As of 2026-04-19, the IFN arm has 4 interventional anchors across 2 MM cell\
    \ lines and 3 distinct perturbation modalities:** Ren 2019 PHF19-KD shRNA (MM1S), Ishiguro 2021\
    \ GSK126 catalytic EZH2 inhibition (MM1S + RPMI-8226, t197), Yu 2023 MS177 EZH2 PROTAC-degrader\
    \ (MM1S, t205), and Ismail 2022 EZH2+G9a dual inhibition (MM; derepresses ISGs + ERV). Unlike\
    \ edge 6 (E2F arm), the IFN arm engages under BOTH catalytic inhibition AND PRC2-complex loss\
    \ \u2014 the pathway is perturbation-mechanism-robust. Original claim confirmed by mirror-image\
    \ test in MM30 (t110) and direct experimental derepression with reversal on rescue (t124)."
  data_support:
  - task: t124
    description: "Ren 2019 PHF19-KD cross-reference \u2014 IFN-alpha (MW p=3.4e-8, d=0.72) and IFN-gamma\
      \ (p=8.2e-7, d=0.43) shift upward on PHF19 KD in MM1S; reversed on PHF19 rescue (p=3.0e-10). OXPHOS\
      \ and mTORC1 negative controls hold."
  - task: t110
    description: "Mirror-image Polycomb test in MMRF (n=659) \u2014 IFN-gamma d=-0.42 and IFN-alpha d=-0.45\
      \ in gain(1q)+ vs neither; PHF19 silences IFN signaling rather than amplifying constitutive PRC2\
      \ targets."
  - task: t197
    description: "Independent EZH2-inhibitor replication (Ishiguro 2021 GSE155135). GSK126 in two MM lines\
      \ derepresses HALLMARK IFN-alpha and IFN-gamma signatures (RPMI-8226: NES_alpha=+2.83 padj=3.7e-15,\
      \ NES_gamma=+2.84 padj=1.8e-21; MM.1S: NES_alpha=+2.54 padj=3.2e-11, NES_gamma=+2.34 padj=3.2e-11).\
      \ Ren-2019-derived IFN-up gene set: NES=+2.19/+2.13 padj=8.4e-5/3.2e-5. The IFN arm of edge 5 now\
      \ has 3 interventional anchors across 2 perturbations (Ren 2019 PHF19-KD shRNA + Ishiguro 2021\
      \ GSK126) in 2 MM lines (MM1S, RPMI-8226). Identification axis NOT upgraded (overall t197 verdict\
      \ Weakly_replicated 1/2 because the E2F leg of the conjunctive rubric failed in MM.1S)."
  - task: t205
    description: "Third interventional anchor \u2014 MS177 EZH2 PROTAC-degrader in MM.1S (Yu 2023
      GSE214668, n=8, 0.5 \u00b5M \u00d7 24h). HALLMARK_INTERFERON_ALPHA_RESPONSE NES=+1.96 padj=6.9e-06;
      HALLMARK_INTERFERON_GAMMA_RESPONSE NES=+2.07 padj=3.0e-09. Ren2019_IFN_up NES=+1.71 padj=0.0087.
      Specificity controls: MS177N1 (inactive variant) sub-verdict Neither; C24 (catalytic-only parent)
      sub-verdict Neither. IFN arm now has 4 interventional anchors across 3 perturbations (Ren 2019
      shRNA + Ishiguro 2021 GSK126 catalytic + Yu 2023 MS177 degrader) in 2 MM lines (MM1S, RPMI-8226).
      Within-series C24 null adds: catalytic inhibition alone does not drive IFN reactivation at
      0.5 \u00b5M/24h dosing \u2014 the IFN arm, like the E2F arm, requires PRC2-complex loss to engage
      (though at higher GSK126 doses t197 achieved engagement in MM.1S anyway)."
  lit_support:
  - doi: null
    author_year: PHF19-comprehensive
    description: "Reviews Ren 2019 Blood finding that PHF19 depletion in MM derepresses IFN-JAK-STAT genes;\
      \ provides the mechanistic chain (Tudor \u2192 H3K27me3 \u2192 IFN silencing) at the level of chromatin\
      \ biochemistry."
  - doi: 10.1038/s41420-020-00400-0
    author_year: Ishiguro2021
    description: "EZH2 inhibition (GSK126) in MM.1S and RPMI-8226 reactivates IFN signalling \u2014 paper's\
      \ own primary finding, independently confirmed by t197 reanalysis at NES > 2 in both lines."
  - doi: 10.3390/biomedicines10112767
    author_year: Ismail2022
    description: "MM-specific epigenetics review that independently names EZH2 + G9a (H3K9me2) dual
      inhibition as producing derepression of IFN-stimulated genes in MM cells \u2014 a distinct
      interventional axis (EZH2 + H3K9me2 combined) from the shRNA (Ren 2019) and single-agent GSK126
      (Ishiguro 2021 / t197) anchors, reaching the same functional endpoint. Serves as the 4th
      independent IFN-arm anchor and extends the IFN-arm evidence beyond EZH2-only perturbations to the
      broader repressive-chromatin circuitry. Does NOT mention PHF19, so it anchors the PRC2 \u2192 IFN
      step rather than the PHF19 \u2192 PRC2 step."
- id: 6
  source: prc2
  target: ccis
  source_label: PRC2 retargeting (latent)
  target_label: Cell-cycle inhibitor silencing
  original_label: "broad domains (E2F arm: perturbation-mechanism-dependent \u2014 PRC2-complex loss required)"
  edge_style: solid
  relation: repressive mark deposition
  edge_status: supported
  identification: interventional
  caveats:
  - "Perturbation-mechanism-dependent: PRC2-complex loss (Ren 2019 PHF19-KD shRNA in MM.1S; Yu 2023\
    \ MS177 EZH2 PROTAC-degrader in MM.1S) drives full E2F/G2M repression (|NES|=3.00, padj=1.5e-32\
    \ in t205); catalytic-only EZH2 inhibition (Ishiguro 2021 GSK126 in MM.1S; Yu 2023 C24 parent\
    \ compound in MM.1S) does NOT engage the E2F arm at 0.5 \u00B5M / 24h dosing (E2F NES \u2248\
    \ \u22121.1, padj > 0.3). GSK126 in RPMI-8226 does engage the E2F arm (NES=\u22121.47, padj=0.008),\
    \ so cell-line context also matters. The E2F arm of the PRC2 mechanism is therefore NOT\
    \ symmetric with the IFN arm (edge 5) \u2014 IFN has 4 interventional anchors across 2 cell\
    \ lines and engages under catalytic inhibition; E2F has 2 complex-loss anchors in MM.1S plus\
    \ 1 catalytic anchor in RPMI-8226, and fails under catalytic-only perturbation in MM.1S."
  description: "The same PHF19-directed PRC2 machinery silences cell-cycle inhibitors at new loci via\
    \ broad H3K27me3 domains. Supported by the symmetric finding that E2F target / cell-cycle output\
    \ genes are massively repressed on PHF19 knockdown and re-induced on rescue in MM1S. **However,\
    \ as of 2026-04-19 this edge is empirically asymmetric with edge 5 (IFN arm):** PRC2-complex\
    \ loss drives the E2F signature, but catalytic EZH2 inhibition alone does not in MM.1S\
    \ (t197 partial, t205 degrader rescue via catalytic-vs-scaffold distinction). This is consistent\
    \ with the Parreno 2024 mechanism in which Polycomb-controlled states, once flipped, can be\
    \ locked by TF occupancy at newly-accessible chromatin independent of H3K27me3 maintenance.\
    \ Biomarker-vs-viability-driver reading: PHF19/PRC2 is required to ESTABLISH the E2F-silencing\
    \ state; maintenance may rely on other scaffolding (hence catalytic-only rescue is incomplete)."
  data_support:
  - task: t124
    description: "Ren 2019 PHF19-KD in MM1S \u2014 E2F targets shift DOWN on PHF19 KD (MW p=8.3e-89, d=-1.83),\
      \ reversed on PHF19 rescue (p=2.1e-83). PHF19 loss arrests the cell cycle, consistent with PRC2\
      \ normally silencing cell-cycle brakes."
  - task: t197
    description: "Independent EZH2-inhibitor replication (Ishiguro 2021 GSE155135) \u2014 PARTIAL. GSK126\
      \ represses HALLMARK_E2F_TARGETS in RPMI-8226 (NES=-1.47 padj=0.0075; Ren2019_E2F_down NES=-1.49\
      \ padj=0.0075) but NOT in MM.1S (NES=-1.09 padj=0.32; G2M NES=-0.82 padj=0.91), even though MM.1S\
      \ is the cell line where Ren 2019 found d=-1.83. EZH2 catalytic inhibition does not recapitulate\
      \ the magnitude of PHF19-KD on the E2F arm. Cross-line Spearman \u03C1 on moderated-t = 0.235\
      \ \u2014 cell lines respond very differently at the gene level. Edge 6 identification not upgraded;\
      \ E2F arm now flagged as more context-dependent than the IFN arm of edge 5."
  - task: t205
    description: "Second interventional anchor for the MM.1S E2F arm \u2014 MS177 EZH2 PROTAC-degrader
      in MM.1S (Yu 2023 GSE214668, n=8, 0.5 \u00b5M \u00d7 24h). HALLMARK_E2F_TARGETS NES=\u22123.00
      padj=1.5e-32; HALLMARK_G2M_CHECKPOINT NES=\u22122.55 padj=1.9e-17; Ren2019_E2F_down NES=\u22123.11
      padj=4.7e-36. Magnitude matches or exceeds Ren 2019 d=\u22121.83. **Within-series
      catalytic-vs-scaffold adjudication:** C24 (parent compound without degrader moiety, catalytic-only
      EZH2 inhibitor) sub-verdict Neither (E2F NES=\u22121.09 padj=0.31); MS177N1 (inactive variant)
      sub-verdict Neither (E2F NES=\u22121.10 padj=0.31). At equivalent dose and time in the same
      cell line, degradation drives the full signature while catalytic inhibition drives nothing
      measurable \u2014 supports the t197-proposed catalytic-vs-scaffold mechanism distinction.
      E2F arm now has 2 independent PRC2-complex-loss anchors in MM.1S (Ren 2019 PHF19-KD shRNA +
      Yu 2023 MS177 degrader) and 1 RPMI-8226 anchor under catalytic inhibition (Ishiguro 2021
      GSK126). Edge 6 identification upgraded: observational \u2192 interventional-replicated.
      UPR diagnostic (pre-reg \u00a78): HALLMARK_UPR NES=+1.45 padj=0.02 (below |NES|>2 strong-flag
      threshold); DDIT3 logFC=+3.4 per-gene is notable but pathway-level UPR is ~2x weaker than E2F
      repression (NES=\u22123.0), so the E2F signal is not parsimoniously a UPR/stress consequence."
  lit_support:
  - doi: null
    author_year: PHF19-comprehensive
    description: "Ren 2019 Blood review \u2014 PHF19 depletion derepresses cell-cycle inhibitors (CDKN1A/1B/2A\
      \ family) in myeloma; broad H3K27me3 domain biology."
  - doi: 10.1038/s41586-024-07328-w
    author_year: Parreno2024
    description: "Cross-system mechanistic support for the PRC2 \u2192 cell-cycle-inhibitor silencing
      logic. In Drosophila, transient PRC1 (Polyhomeotic) loss derepresses a set of ~30 irreversible
      direct PcG target genes; JAK-STAT pathway TFs (STAT92E, ZFH1) lock the derepressed loci open even
      after H3K27me3 is re-established, producing a one-way ratchet. MM relevance is indirect (PRC1 in
      fly, not PRC2 in mammal), but the principle \u2014 that Polycomb-controlled gene states, once
      flipped, can become self-sustaining through TF recruitment at newly-accessible chromatin \u2014
      motivates why silencing at cell-cycle-inhibitor loci can be stable even under downstream
      perturbations. Consistent with the t197 observation that the E2F arm is more context-dependent
      than the IFN arm: cell-cycle inhibitor silencing may be stably locked by TF occupancy independent
      of PRC2 maintenance, explaining why EZH2 catalytic inhibition does not always reopen the E2F
      program."
