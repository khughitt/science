  data_support:
  - task: t113
    description: 'Stratum-specific Cox covariate comparison: r=0.93 between gain(1q)+/- survival coefficients;
      proliferation the shared endpoint.'
  - task: t118
    description: Ribosome/PHF19 program 81.5% proliferation-mediated in gain(1q)+.
  lit_support: []
- id: 21
  source: arch_non1q
  target: prolif
  source_label: Alternative non-1q architecture (E2F, ribosome)
  target_label: Proliferation (latent state; score is proxy)
  original_label: E2F/ribosome program
  edge_style: solid
  relation: program
  edge_status: supported
  identification: observational
  description: "The gain(1q)- architecture (E2F, ribosome biogenesis/translation) also drives proliferation\
    \ but through a different upstream program (protein synthesis capacity, RPF2/POLR1A/FASTKD2). t118\
    \ shows only 12.8% proliferation mediation of the ribosome program in 1q- (vs 81.5% in 1q+) \u2014\
    \ the program contributes to proliferation but is not reducible to it."
  data_support:
  - task: t114
    description: 13 genuinely stratum-specific gain(1q)- genes; ribosome biogenesis program.
  - task: t118
    description: Ribosome program 12.8% proliferation-mediated in gain(1q)- vs 81.5% in 1q+.
  - task: t125
    description: 'Null model retraction: mediation-% asymmetry is driven by baseline Cox- proliferation
      correlation differences rather than a clean causal split.'
  lit_support: []
- id: 22
  source: prolif
